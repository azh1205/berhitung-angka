<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Floating Bubbles</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Health Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Header: Score & Health -->
        <header id="game-header">
            <div class="score-board">
                <span>Score: </span>
                <span id="score-display">0</span>
            </div>
            <div class="health-board" id="health-display">
                <!-- Hearts will be generated by JS -->
            </div>
        </header>

        <!-- Question Area -->
        <main id="question-area">
            <h1 id="question-text">Ready?</h1>
        </main>

        <!-- Play Area for Floating Bubbles -->
        <div id="play-area">
            <!-- Bubbles generated here -->
        </div>

        <!-- Overlays -->
        <div id="start-overlay" class="overlay active">
            <div class="panel glass-panel">
                <h1>Math Bubbles!</h1>
                <p>Tap the correct answers floating around.<br>Don't lose your 5 hearts!</p>
                <button id="start-btn" class="action-btn">Start Game</button>
            </div>
        </div>

        <div id="game-over-overlay" class="overlay">
            <div class="panel glass-panel">
                <h1>Game Over</h1>
                <p>Your Score: <span id="final-score">0</span></p>
                <button id="restart-btn" class="action-btn">Play Again</button>
            </div>
        </div>
    </div>
    
    <script src="renderer.js"></script>
</body>
</html>
